name: Build APK

# Builds a signed debug APK on every push to main and publishes it to a rolling
# "latest" GitHub Release, so it can be downloaded and installed directly from a
# phone browser — no USB cable needed. Each build's versionCode is the run
# number, so newer builds install cleanly over older ones.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: "0.1.${{ github.run_number }}"
        run: ./gradlew assembleDebug

      - name: Stage APK with a stable name
        run: cp app/build/outputs/apk/debug/app-debug.apk SibirskySpeak.apk

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SibirskySpeak-apk
          path: SibirskySpeak.apk

      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Automatic build from commit ${{ github.sha }}.
            Download **SibirskySpeak.apk** below and open it on your phone to install.
          files: SibirskySpeak.apk
          make_latest: true
